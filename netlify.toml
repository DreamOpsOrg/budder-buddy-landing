[build]
  publish = "."

# Explicit routes for each HTML page — must come BEFORE the catch-all
[[redirects]]
  from = "/features"
  to = "/features.html"
  status = 200

[[redirects]]
  from = "/healing-guide"
  to = "/healing-guide.html"
  status = 200

[[redirects]]
  from = "/for-artists"
  to = "/for-artists.html"
  status = 200

# IndexNow key file — must come BEFORE catch-all
[[redirects]]
  from = "/8fe87788f75ef05a4f2f10a97640124d.txt"
  to = "/8fe87788f75ef05a4f2f10a97640124d.txt"
  status = 200
  force = true

# Catch-all for any unmatched paths → home
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
